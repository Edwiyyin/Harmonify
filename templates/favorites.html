<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Favorite Songs</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background-color: white;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .page-title {
            text-align: center;
            color: #2563eb;
            margin-bottom: 20px;
        }
        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .song-card {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
        }
        .no-favorites {
            text-align: center;
            color: #666;
            margin-top: 20px;
        }
        .btn {
            display: inline-block;
            padding: 10px 15px;
            margin: 5px;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
        }
        .btn-primary {
            background-color: #2563eb;
            color: white;
        }
        .remove-favorite {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
        }
        .back-btn {
            background-color: #6b7280;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="your-favorite-songs" class="page-title">Your Favorite Songs</h1>
<a href="/" class="btn back-btn">Back to Search</a>
        {{if .Favorites}}
        <div class="favorites-grid">
            {{range .Favorites}}
            <div class="song-card" data-song-id="{{.ID}}">
                <h2>{{.Title}}</h2>
                <p>{{.Artist}}</p>

                <div class="song-actions">
                    <a href="/lyrics?id={{.ID}}&title={{urlencodeTitle .Title}}&artist={{urlencodeTitle .Artist}}" class="btn btn-primary">View Lyrics</a>
                    <span class="remove-favorite">✖</span>
                </div>
            </div>
            {{end}}
        </div>
        {{else}}
        <div class="no-favorites">
            No favorite songs yet. Start searching and add some!
        </div>
        {{end}}
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const removeFavoriteButtons = document.querySelectorAll('.remove-favorite');
        
        removeFavoriteButtons.forEach(button => {
            button.addEventListener('click', async (e) => {
                const songCard = e.target.closest('.song-card');
                const songId = songCard.dataset.songId;

                try {
                    const response = await fetch('/remove-favorite', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ id: songId })
                    });

                    const result = await response.json();
                    if (result.success) {
                        songCard.remove();
                        
                        // Check if no favorites remain
                        const remainingFavorites = document.querySelectorAll('.song-card');
                        if (remainingFavorites.length === 0) {
                            const grid = document.querySelector('.favorites-grid');
                            grid.innerHTML = `
                                <div class="no-favorites">
                                    No favorite songs yet. Start searching and add some!
                                </div>
                            `;
                        }
                    } else {
                        alert('Failed to remove from favorites');
                    }
                } catch (error) {
                    console.error('Error removing favorite:', error);
                    alert('Failed to remove from favorites');
                }
            });
        });
    });
    </script>
</body>
</html>
