<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{.Title}} - Lyrics</title>
    <link rel="stylesheet" href="/static/css/lyrics.css">
</head>
<body>
    <div class="container">
        <div class="lyrics-card">
            <h1 id="title" class="song-title">{{.Title}}</h1>
            <h2 id="artist" class="song-artist">{{.Artist}}</h2>

            <pre class="lyrics-pre">{{.Lyrics}}</pre>

            <div class="btn-container">
                <a href="#" class="btn btn-favorites">Add to Favorites</a>
                <a href="{{.ExternalURL.Spotify}}" class="btn btn-listen" target="_blank">Listen 🎵</a>
                <a href="javascript:history.back()" class="btn btn-back">Go Back</a>
            </div>

            <div id="youtube-container"></div>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const favoriteButton = document.querySelector('.btn-favorites');
        const title = document.getElementById('title').textContent.trim();
        const artist = document.getElementById('artist').textContent.trim();

        favoriteButton.addEventListener('click', async (e) => {
            e.preventDefault();
            const songId = new URLSearchParams(window.location.search).get('id');

            try {
                const response = await fetch('/add-favorite', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        id: songId, 
                        title: title, 
                        artist: artist
                    })
                });

                const result = await response.json();
                alert(result.message);
            } catch (error) {
                console.error('Error adding favorite:', error);
                alert('Failed to add to favorites');
            }
        });

        async function searchYouTubeMusic() {
            try {
                const response = await fetch(`/search-youtube?title=${encodeURIComponent(title)}&artist=${encodeURIComponent(artist)}`);
                const data = await response.json();
                
                if (data.videoUrl) {
                    const youtubeContainer = document.getElementById('youtube-container');
                    const musicPlayer = document.createElement('iframe');
                    musicPlayer.src = data.videoUrl;
                    musicPlayer.width = '100%';
                    musicPlayer.height = '315';
                    musicPlayer.allowFullscreen = true;
                    
                    youtubeContainer.appendChild(musicPlayer);
                }
            } catch (error) {
                console.error('YouTube search error:', error);
            }
        }

        searchYouTubeMusic();
    });
    </script>
</body>
</html>
