<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Lyrics Finder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background-color: white;
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .page-title {
            color: #2563eb;
            margin-bottom: 30px;
            font-size: 2.5rem;
        }
        .search-container {
            max-width: 600px;
            margin: 0 auto;
        }
        .search-input {
            width: 100%;
            padding: 15px;
            font-size: 1rem;
            border: 2px solid #2563eb;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .search-btn {
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            margin: 20px;
        }
        .search-btn:hover {
            background-color: #1e40af;
        }
        .favorites-btn
        {
            background-color: #f59e0b;
            color: white;
            border: none;
            padding: 15px 20px;
            font-size: 1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-decoration: none;
            margin: 20px;
        }
        .favorites-btn:hover {
            background-color: #ed8936;
        }
        .description {
            color: #666;
            margin-bottom: 30px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="lyrics-finder" class="page-title">Harmonify</h1>

        <p>Find lyrics to your favorite songs instantly! Simply enter a song title, artist name, or both.</p>

        <div class="search-container">
            <form action="/search" method="GET" class="search-form">
                <input type="text" 
                       name="query" 
                       class="search-input" 
                       placeholder="Search for songs, artists..." 
                       required>
                <button type="submit" class="search-btn">Search</button>
            </form>
        </div>

        <div class="favorites-link">
            <a href="/favorites" class="favorites-btn">View Favorites</a>
        </div>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const searchInput = document.querySelector('input[name="query"]');
        
        searchInput.addEventListener('input', async (e) => {
            const query = e.target.value;
            if (query.length > 2) {
                try {
                    const response = await fetch(`/search-suggestions?q=${encodeURIComponent(query)}`);
                    const suggestions = await response.json();
                    
                    // Create or update suggestion dropdown
                    let suggestionDropdown = document.getElementById('search-suggestions');
                    if (!suggestionDropdown) {
                        suggestionDropdown = document.createElement('div');
                        suggestionDropdown.id = 'search-suggestions';
                        searchInput.parentNode.appendChild(suggestionDropdown);
                    }
                    
                    suggestionDropdown.innerHTML = suggestions.map(
                        suggestion => `<div class="suggestion-item">${suggestion}</div>`
                    ).join('');
                } catch (error) {
                    console.error('Suggestions error:', error);
                }
            }
        });
    });
    </script>
</body>
</html>
